services:
  db:
    image: postgres:16-alpine
    container_name: studysphere-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: studysphere
      POSTGRES_USER: studysphere
      POSTGRES_PASSWORD: studysphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studysphere -d studysphere"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./studysphere-backend
      dockerfile: Dockerfile
    container_name: studysphere-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://studysphere:studysphere@db:5432/studysphere?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OPENAI_KEY: ${OPENAI_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  postgres_data:
